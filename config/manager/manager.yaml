apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-vnet-controller
  namespace: kube-vnet-system
  labels:
    app.kubernetes.io/name: kube-vnet
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-vnet
      app.kubernetes.io/component: controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-vnet
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: kube-vnet-controller
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/lhns/kube-vnet:latest
          imagePullPolicy: IfNotPresent
          args:
            - --leader-elect
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
            # ADR 0030: baseline is unconditionally deny-all minus
            # --elide-baseline-for exemptions. The kustomize-driven dev/e2e
            # deployment leaves --default-memberships empty so e2e's
            # "must-be-blocked" assertions hold (no implicit cluster-wide
            # allow-all). Chart users can override via --default-memberships.
            - --elide-baseline-for=cluster
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: 8080
              name: metrics
            - containerPort: 8081
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      terminationGracePeriodSeconds: 10
