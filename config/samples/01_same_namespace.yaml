# Simplest case: only pods in the same namespace as the VirtualNetwork can join.
# spec.allowedNamespaces is omitted, which is equivalent to "home namespace only".
apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: kube-vnet/v1alpha1
kind: VirtualNetwork
metadata:
  name: payments
  namespace: platform
spec:
  description: |
    Payments services within the platform namespace. No foreign namespace access.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
        # Bare join label for the home namespace.
        kube-vnet/net.payments: "true"
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
