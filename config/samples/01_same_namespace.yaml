# Simplest case: only pods in the same namespace as the VirtualNetwork can join.
# spec.allowedNamespaces is omitted, which is equivalent to "home namespace only".
#
# Per ADR 0030, every managed namespace gets a deny-all baseline by default.
# The pod that joins the `payments` vnet (kube-vnet/net.payments=both) is then
# additively allowed to receive ingress from other vnet peers — pods without
# the join label can't reach it. To open the namespace up, set
# kube-vnet/disabled=true on the namespace (the operator stays out entirely).
apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: kube-vnet.lhns.de/v1alpha1
kind: VirtualNetwork
metadata:
  name: payments
  namespace: platform
spec:
  description: |
    Payments services within the platform namespace. No foreign namespace access.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
        # Bare join label for the home namespace.
        kube-vnet/net.payments: "both"
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
