# Simplest case: only pods in the same namespace as the VirtualNetwork can join.
# spec.allowedNamespaces is omitted, which is equivalent to "home namespace only".
#
# This namespace is set to ingress-isolation `pod` so the example actually
# demonstrates isolation: pods without the join label can't reach pods that
# have it. To loosen, change the annotation to `namespace` (allow same-ns
# ingress) or remove it (no baseline; vnet narrows membership only). See
# config/samples/07_ingress_isolation_modes.yaml for a side-by-side demo of
# all three modes.
apiVersion: v1
kind: Namespace
metadata:
  name: platform
  annotations:
    kube-vnet/ingress-isolation: pod
---
apiVersion: kube-vnet.lhns.de/v1alpha1
kind: VirtualNetwork
metadata:
  name: payments
  namespace: platform
spec:
  description: |
    Payments services within the platform namespace. No foreign namespace access.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
        # Bare join label for the home namespace.
        kube-vnet/net.payments: "true"
    spec:
      containers:
        - name: app
          image: nginx:alpine
          ports:
            - containerPort: 80
