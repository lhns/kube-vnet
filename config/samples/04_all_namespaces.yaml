# Wildcard: any namespace's pods may join. Useful for cross-cutting concerns
# like observability or service mesh sidecars.
#
# Both namespaces are set to ingress-isolation `pod` so the example shows the
# isolation effect end-to-end. Note that even with `allowedNamespaces.all=true`
# on the vnet, each namespace still picks its own ingress-isolation
# independently — a wildcard vnet doesn't blanket-isolate every namespace.
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  annotations:
    kube-vnet/ingress-isolation: pod
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform
  annotations:
    kube-vnet/ingress-isolation: pod
---
apiVersion: kube-vnet.lhns.de/v1alpha1
kind: VirtualNetwork
metadata:
  name: observability
  namespace: monitoring
spec:
  description: |
    Cluster-wide observability network. Any pod in any namespace may join via
    the namespace-prefixed label kube-vnet/net.monitoring.observability=true.
  allowedNamespaces:
    all: true
---
# Foreign namespace pod joining via the prefixed label.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: platform
spec:
  replicas: 1
  selector: { matchLabels: { app: orders } }
  template:
    metadata:
      labels:
        app: orders
        kube-vnet/net.monitoring.observability: "true"
    spec:
      containers:
        - name: app
          image: nginx:alpine
