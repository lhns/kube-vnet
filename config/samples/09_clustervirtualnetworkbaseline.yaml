# A ClusterVirtualNetworkBaseline (ADR 0031) is the cluster-wide tier-default
# for vnet memberships. Singleton, named `default`. The Helm chart seeds this
# from `operator.clusterBaseline.ingressIsolationLevel` (or an explicit
# `operator.clusterBaseline.memberships` map); you can edit it post-install
# (the chart annotates it with helm.sh/resource-policy: keep, but a helm
# upgrade re-renders it from the values — kubectl edits are overwritten).
#
# Bare directions are enforced — namespace baselines, bindings, and pod
# labels cannot override them. `default-*` directions are advisory — lower
# tiers may override per-vnet.
#
# This example shows the equivalent of `ingressIsolationLevel: namespace`:
# pods join their per-namespace system vnet (overridable) and the cluster
# system vnet for egress only (overridable).
apiVersion: kube-vnet.lhns.de/v1alpha1
kind: ClusterVirtualNetworkBaseline
metadata:
  name: default
spec:
  memberships:
    - virtualNetworkRef:
        name: namespace
        namespace: kube-vnet-system
      direction: default-both
    - virtualNetworkRef:
        name: cluster
        namespace: kube-vnet-system
      direction: default-egress
