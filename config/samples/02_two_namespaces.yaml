# Two specific foreign namespaces are allowed to join, in addition to the home namespace.
#
# Per ADR 0030, every managed namespace ships with a deny-all baseline by
# default. Only pods in `allowedNamespaces` that opt in via the join label
# get additive ingress allows from vnet peers. spec.allowedNamespaces gates
# which foreign namespaces can JOIN; the deny-all baseline lives in every
# managed namespace independently.
apiVersion: v1
kind: Namespace
metadata:
  name: platform
---
apiVersion: v1
kind: Namespace
metadata:
  name: webapp
---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
---
apiVersion: kube-vnet.lhns.de/v1alpha1
kind: VirtualNetwork
metadata:
  name: payments
  namespace: platform
spec:
  description: |
    Payments services. Pods in the webapp and monitoring namespaces may
    join this network by adding the prefixed join label
    kube-vnet/net.platform.payments=true. Pods in those namespaces that
    don't carry the label are not granted access.
  allowedNamespaces:
    names:
      - webapp
      - monitoring
---
# Home-namespace pod uses the bare label form.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: platform
spec:
  replicas: 1
  selector: { matchLabels: { app: orders } }
  template:
    metadata:
      labels:
        app: orders
        kube-vnet/net.payments: "both"
    spec:
      containers:
        - name: app
          image: nginx:alpine
---
# Foreign-namespace pod uses the namespace-prefixed label form: kube-vnet/net.<homeNS>.<vnet>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: webapp
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend } }
  template:
    metadata:
      labels:
        app: frontend
        kube-vnet/net.platform.payments: "both"
    spec:
      containers:
        - name: app
          image: nginx:alpine
