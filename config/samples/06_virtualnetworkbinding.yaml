# A VirtualNetworkBinding is the no-label alternative for attaching pods to
# a VirtualNetwork — useful when the pod template is owned by an upstream
# Helm chart, third-party manifests, or another operator and you can't add
# the join label directly. The binding lives in the same namespace as the
# pods it selects via a non-empty podSelector (ADR 0031).
#
# Direction is one of the four bare values: both | ingress | egress | none.
# Defaults to "both". (default-* values are baseline-tier only.)
#
# The deny-all baseline lands automatically in every managed namespace, so
# only the pods matched by the binding's podSelector accept ingress from the
# target vnet's peers; everything else in the namespace stays isolated.
# Apply alongside config/samples/02_two_namespaces.yaml (which creates the
# `platform/payments` vnet that this binding references).
apiVersion: v1
kind: Namespace
metadata:
  name: webapp
---
apiVersion: kube-vnet.lhns.de/v1alpha1
kind: VirtualNetworkBinding
metadata:
  name: payments-thirdparty
  namespace: webapp
spec:
  virtualNetworkRef:
    name: payments
    namespace: platform
  direction: both
  podSelector:
    matchLabels:
      app: thirdparty-billing-agent
