# Allow any namespace whose labels match a selector. Idiomatic for "all prod namespaces".
#
# All three namespaces are set to ingress-isolation `pod` so the demonstration
# is self-contained: only labeled pods in `platform` and `prod-webapp` reach
# each other; the dev-webapp join attempt is rejected at the vnet level AND
# its baseline blocks unrelated ingress.
apiVersion: v1
kind: Namespace
metadata:
  name: platform
  annotations:
    kube-vnet/ingress-isolation: pod
---
apiVersion: v1
kind: Namespace
metadata:
  name: prod-webapp
  labels:
    tier: prod
  annotations:
    kube-vnet/ingress-isolation: pod
---
apiVersion: v1
kind: Namespace
metadata:
  name: dev-webapp
  labels:
    tier: dev
  annotations:
    kube-vnet/ingress-isolation: pod
---
apiVersion: kube-vnet.lhns.de/v1alpha1
kind: VirtualNetwork
metadata:
  name: payments
  namespace: platform
spec:
  description: |
    Payments services. Pods in any namespace labeled tier=prod may join this
    network (by adding the prefixed join label). Pods in tier=prod namespaces
    that don't carry the label are not granted access; pods in non-prod
    namespaces can't join at all.
  allowedNamespaces:
    selector:
      matchLabels:
        tier: prod
---
# Reachable: prod-webapp matches tier=prod.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: prod-webapp
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend } }
  template:
    metadata:
      labels:
        app: frontend
        kube-vnet/net.platform.payments: "both"
    spec:
      containers:
        - name: app
          image: nginx:alpine
---
# NOT reachable: dev-webapp's tier=dev does not match. The pod's join label is ignored,
# and the VirtualNetwork's status will surface an InvalidJoiner entry.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-dev
  namespace: dev-webapp
spec:
  replicas: 1
  selector: { matchLabels: { app: frontend-dev } }
  template:
    metadata:
      labels:
        app: frontend-dev
        kube-vnet/net.platform.payments: "both"
    spec:
      containers:
        - name: app
          image: nginx:alpine
