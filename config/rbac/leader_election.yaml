apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kube-vnet-leader-election
  namespace: kube-vnet-system
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kube-vnet-leader-election
  namespace: kube-vnet-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kube-vnet-leader-election
subjects:
  - kind: ServiceAccount
    name: kube-vnet-controller
    namespace: kube-vnet-system
