---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-vnet-manager
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kube-vnet
  resources:
  - virtualnetworks
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - kube-vnet
  resources:
  - virtualnetworks/finalizers
  verbs:
  - update
- apiGroups:
  - kube-vnet
  resources:
  - virtualnetworks/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - networking.k8s.io
  resources:
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
