# ValidatingAdmissionPolicy rejecting unrecognized direction values on kube-vnet
# join labels. Requires Kubernetes >= 1.30 (where VAP is GA in the v1 API).
#
# On older clusters this resource won't apply (the API version doesn't exist);
# the operator's vnet-status `UnknownDirection` reason still catches bad
# values at reconcile time. See ADR 0027.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kube-vnet-join-label-direction
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["pods"]
  variables:
    - name: joinKeyPrefix
      expression: '"kube-vnet/net."'
    - name: validValues
      expression: '["both","ingress","egress","none"]'
  validations:
    - expression: |
        object.metadata.labels.all(k,
          !k.startsWith(variables.joinKeyPrefix) ||
          object.metadata.labels[k] in variables.validValues)
      message: "kube-vnet join label values must be one of: both, ingress, egress, none. The legacy true/false/empty aliases were removed per ADR 0030."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: kube-vnet-join-label-direction
spec:
  policyName: kube-vnet-join-label-direction
  validationActions: [Deny]
