kind: ValidatingAdmissionPolicy
metadata:
  name: kube-vnet-controller-system-labels-protected
  labels:
    helm.sh/chart: kube-vnet-0.1.0
    app.kubernetes.io/name: kube-vnet
    app.kubernetes.io/instance: kube-vnet-controller
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: controller
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["pods"]
      - apiGroups:   ["networking.k8s.io"]
        apiVersions: ["v1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["networkpolicies"]
      - apiGroups:   ["kube-vnet.lhns.de"]
        apiVersions: ["v1alpha1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["virtualnetworks"]
  variables:
    # The system-label prefix kube-vnet.system/ is reserved for operator output.
    - name: systemPrefix
      expression: '"kube-vnet.system/"'
    # The operator's ServiceAccount username is exempted from this VAP.
    # Templated from Helm release values so a non-default install lines up.
    - name: operatorUser
      expression: "\"system:serviceaccount:kube-vnet-system:kube-vnet-controller\""
    # System labels in the new object.
    - name: newSystemLabels
      expression: 'object.metadata.?labels.orValue({}).filter(k, k.startsWith(variables.systemPrefix))'
    # System labels in the old object (empty for CREATE).
    - name: oldSystemLabels
      expression: 'oldObject == null ? [] : oldObject.metadata.?labels.orValue({}).filter(k, k.startsWith(variables.systemPrefix))'
  validations:
    # Allow if the requester is the operator's ServiceAccount.
    # Otherwise require that no kube-vnet.system/* labels are added, removed,
    # or changed: the set of (key, value) pairs in oldObject and object must
    # be identical for system-prefixed keys.
    - expression: |
        request.userInfo.username == variables.operatorUser ||
        (
          variables.newSystemLabels.all(k,
            oldObject != null &&
            (k in oldObject.metadata.?labels.orValue({})) &&
            object.metadata.labels[k] == oldObject.metadata.labels[k]
          ) &&
          variables.oldSystemLabels.all(k,
            (k in object.metadata.?labels.orValue({}))
          )
        )
      message: "kube-vnet.system/* labels are operator-managed; users must not set, change, or remove them. See ADR 0030 and ADR 0037."
