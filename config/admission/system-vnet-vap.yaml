# Generated from charts/kube-vnet/templates/system-vnet-vap.yaml by 'make render-kustomize-vaps'.
# Do not edit by hand -- run the make target instead. ADR 0030.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: kube-vnet-controller-system-vnet-protected
  labels:
    helm.sh/chart: kube-vnet-0.1.0
    app.kubernetes.io/name: kube-vnet
    app.kubernetes.io/instance: kube-vnet-controller
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: controller
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   ["kube-vnet.lhns.de"]
        apiVersions: ["v1alpha1"]
        operations:  ["UPDATE", "DELETE"]
        resources:   ["virtualnetworks"]
  variables:
    - name: operatorUser
      expression: "\"system:serviceaccount:kube-vnet-system:kube-vnet-controller\""
    # Whether the affected object carries kube-vnet/system=true.
    # On DELETE the apiserver evaluates `oldObject` (the object being
    # deleted); on UPDATE both `object` (new) and `oldObject` are populated.
    # We check oldObject so DELETE works correctly; UPDATE also looks at
    # oldObject which matches as long as the user isn't trying to remove
    # the system label (which would itself need to pass this check).
    - name: isSystemVnet
      expression: 'oldObject.metadata.?labels["kube-vnet/system"].orValue("") == "true"'
  validations:
    - expression: |
        request.userInfo.username == variables.operatorUser ||
        !variables.isSystemVnet
      message: "VirtualNetworks labeled kube-vnet/system=true are operator-managed; users must not update or delete them. See ADR 0030."
---
