apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kube-vnet.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kube-vnet.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "kube-vnet.labels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "kube-vnet.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: manager
          image: {{ include "kube-vnet.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- if .Values.operator.leaderElect }}
            - --leader-elect
            {{- end }}
            - --metrics-bind-address={{ .Values.operator.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.operator.healthProbeBindAddress }}
            - --label-prefix={{ .Values.operator.labelPrefix }}
            {{- /* disabledNamespaces (preferred) with one-cycle excludedNamespaces fallback. */}}
            {{- $disabled := default (list) .Values.operator.disabledNamespaces -}}
            {{- if not $disabled }}{{- $disabled = default (list) .Values.operator.excludedNamespaces }}{{- end }}
            {{- with $disabled }}
            - --disabled-namespaces={{ join "," . }}
            {{- end }}
            {{- with .Values.operator.ingressIsolation }}
            - --ingress-isolation={{ required "operator.ingressIsolation.mode is required (one of: none, namespace, pod)" .mode }}
            {{- /* namespaceOverrides.{none,namespace,pod} (preferred) with one-cycle force* fallback. */}}
            {{- $no := default (list) (default (dict) .namespaceOverrides).none -}}
            {{- if not $no }}{{- $no = default (list) .forceNone }}{{- end }}
            {{- with $no }}
            - --ingress-isolation-none={{ join "," . }}
            {{- end }}
            {{- $ns := default (list) (default (dict) .namespaceOverrides).namespace -}}
            {{- if not $ns }}{{- $ns = default (list) .forceNamespace }}{{- end }}
            {{- with $ns }}
            - --ingress-isolation-namespace={{ join "," . }}
            {{- end }}
            {{- $pod := default (list) (default (dict) .namespaceOverrides).pod -}}
            {{- if not $pod }}{{- $pod = default (list) .forcePod }}{{- end }}
            {{- with $pod }}
            - --ingress-isolation-pod={{ join "," . }}
            {{- end }}
            {{- end }}
            {{- if .Values.operator.defaultDenyEverywhere }}
            # DEPRECATED: prefer operator.ingressIsolation.mode=pod.
            - --default-deny-everywhere
            {{- end }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          ports:
            - containerPort: {{ regexReplaceAll "^:" .Values.operator.metricsBindAddress "" | atoi }}
              name: metrics
            - containerPort: {{ regexReplaceAll "^:" .Values.operator.healthProbeBindAddress "" | atoi }}
              name: health
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
