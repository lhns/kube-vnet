{{- /*
CRD shipped as a templated resource (not under `charts/kube-vnet/crds/`) so
`helm upgrade` updates it on chart bumps. Helm's special crds/ directory is
install-once-only and does not propagate updates -- see
https://helm.sh/docs/chart_best_practices/custom_resource_definitions/.
The `helm.sh/resource-policy: keep` annotation prevents `helm uninstall`
from cascading-deleting every existing CR alongside the CRD. ADR 0030.
*/ -}}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    helm.sh/resource-policy: keep
    controller-gen.kubebuilder.io/version: v0.16.5
  name: virtualnetworkbindings.kube-vnet.lhns.de
spec:
  group: kube-vnet.lhns.de
  names:
    kind: VirtualNetworkBinding
    listKind: VirtualNetworkBindingList
    plural: virtualnetworkbindings
    shortNames:
    - vnb
    - vnbs
    singular: virtualnetworkbinding
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.virtualNetworkRef.name
      name: VNet
      type: string
    - jsonPath: .spec.virtualNetworkRef.namespace
      name: VNet-NS
      type: string
    - jsonPath: .spec.direction
      name: Direction
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VirtualNetworkBinding attaches pods selected by spec.podSelector to the
          referenced VirtualNetwork without requiring those pods to carry the join
          label. The binding lives in the same namespace as the pods it selects.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              VirtualNetworkBindingSpec is the desired state of a VirtualNetworkBinding.

              A binding attaches the pods selected by spec.podSelector (in this binding's
              own namespace) to the referenced VirtualNetwork. Per ADR 0031 the
              podSelector must select at least one pod (no empty matchLabels +
              matchExpressions) — namespace-wide defaults belong in a
              VirtualNetworkBaseline. Direction is restricted to bare values; default-*
              is meaningful only at baseline tiers.
            properties:
              direction:
                default: both
                description: |-
                  Direction the selected pods participate in.
                  Same enum as the join label value: both | ingress | egress | none.
                  Defaults to "both". The default-* baseline-tier variants are not
                  permitted here (ADR 0031).
                enum:
                - both
                - ingress
                - egress
                - none
                type: string
              podSelector:
                description: |-
                  PodSelector selects pods *in this binding's own namespace*. Required;
                  must be non-empty (ADR 0031).
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              virtualNetworkRef:
                description: VirtualNetworkRef is the target VirtualNetwork.
                properties:
                  name:
                    description: Name of the target VirtualNetwork.
                    type: string
                  namespace:
                    description: Namespace is the home namespace of the target VirtualNetwork.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - podSelector
            - virtualNetworkRef
            type: object
            x-kubernetes-validations:
            - message: podSelector must select at least one pod (use VirtualNetworkBaseline
                for namespace-wide defaults; ADR 0031)
              rule: (has(self.podSelector.matchLabels) && size(self.podSelector.matchLabels)
                > 0) || (has(self.podSelector.matchExpressions) && size(self.podSelector.matchExpressions)
                > 0)
          status:
            description: VirtualNetworkBindingStatus is the observed state.
            properties:
              attachedPods:
                description: |-
                  AttachedPods is the observed list of pods currently selected by
                  spec.podSelector that the operator has honored as members.
                items:
                  type: string
                type: array
              conditions:
                description: |-
                  Conditions follow the standard Kubernetes condition pattern.
                  Known types: Ready, Degraded.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation last reconciled.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
