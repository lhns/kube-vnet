{{- /*
Validating admission for operator-managed system VirtualNetworks.

The two system vnets `namespace` (one per managed namespace) and `cluster`
(one cluster-wide) are operator-managed: created and drift-corrected by
the SystemVnetReconciler, marked with `kube-vnet/system=true`. Users must
not edit or delete them. The operator's ServiceAccount is exempted via a
username-prefix check.

Note: the SystemVnetReconciler will undo unauthorized edits within a
reconcile cycle anyway — this VAP is defense-in-depth that surfaces the
error to the user immediately rather than silently reverting it.

CREATE is intentionally not gated: a user creating their own VirtualNetwork
that doesn't carry kube-vnet/system=true is fine. The label can only be
applied by the operator (no separate VAP enforces label immutability;
SystemVnetReconciler treats unlabeled vnets as user-owned).

Requires Kubernetes >= 1.30 (where ValidatingAdmissionPolicy is GA). On
older clusters this template renders nothing; SystemVnetReconciler's
drift-correction is the fallback.

See ADR 0030.
*/}}
{{- $kubeMajor := int .Capabilities.KubeVersion.Major -}}
{{- $kubeMinor := int (regexReplaceAll "[^0-9]" .Capabilities.KubeVersion.Minor "") -}}
{{- if or (gt $kubeMajor 1) (and (eq $kubeMajor 1) (ge $kubeMinor 30)) }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kube-vnet.fullname" . }}-system-vnet-protected
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   ["kube-vnet.lhns.de"]
        apiVersions: ["v1alpha1"]
        operations:  ["UPDATE", "DELETE"]
        resources:   ["virtualnetworks"]
  variables:
    - name: operatorUser
      expression: {{ printf "\"system:serviceaccount:%s:%s\""
        (.Release.Namespace)
        (include "kube-vnet.serviceAccountName" .) | quote }}
    # Whether the affected object carries kube-vnet/system=true.
    # On DELETE the apiserver evaluates `oldObject` (the object being
    # deleted); on UPDATE both `object` (new) and `oldObject` are populated.
    # We check oldObject so DELETE works correctly; UPDATE also looks at
    # oldObject which matches as long as the user isn't trying to remove
    # the system label (which would itself need to pass this check).
    - name: isSystemVnet
      expression: 'oldObject.metadata.?labels["kube-vnet/system"].orValue("") == "true"'
  validations:
    - expression: |
        request.userInfo.username == variables.operatorUser ||
        !variables.isSystemVnet
      message: "VirtualNetworks labeled kube-vnet/system=true are operator-managed; users must not update or delete them. See ADR 0030."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kube-vnet.fullname" . }}-system-vnet-protected
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  policyName: {{ include "kube-vnet.fullname" . }}-system-vnet-protected
  validationActions: [Deny]
{{- end }}
