{{- /*
Validating admission for operator-managed system VirtualNetworks.

The two system vnets `namespace` (one per managed namespace) and `cluster`
(one cluster-wide) are operator-managed: created and drift-corrected by
the SystemVnetReconciler, marked with `kube-vnet.system/managed-by=kube-vnet`. This VAP
reserves both the names and the system label for the operator.

Three CREATE/UPDATE/DELETE attempts get rejected unless the requester is
the operator's ServiceAccount:

  1. CREATE/UPDATE/DELETE of any vnet whose name is `namespace` or `cluster`
     (the reserved names — see SystemVnetNamespace/SystemVnetCluster in
     internal/controller/system_vnet_controller.go).
  2. CREATE of a vnet carrying `kube-vnet.system/managed-by=kube-vnet` (label spoofing).
  3. UPDATE/DELETE of a vnet that already carries `kube-vnet.system/managed-by=kube-vnet`.

The operator's ServiceAccount is exempted via username equality.

The SystemVnetReconciler will also undo unauthorized edits within a
reconcile cycle anyway — this VAP is defense-in-depth that surfaces the
error to the user immediately rather than silently reverting it. The
controller-side short-circuit at virtualnetwork_controller.go (skipping
the home-namespace excluded check on system-labeled vnets) trusts that
this VAP keeps the label honest.

Requires Kubernetes >= 1.30 (where ValidatingAdmissionPolicy is GA). On
older clusters this template renders nothing; SystemVnetReconciler's
drift-correction is the fallback.

See ADR 0030.
*/}}
{{- $kubeMajor := int .Capabilities.KubeVersion.Major -}}
{{- $kubeMinor := int (regexReplaceAll "[^0-9]" .Capabilities.KubeVersion.Minor "") -}}
{{- if or (gt $kubeMajor 1) (and (eq $kubeMajor 1) (ge $kubeMinor 30)) }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kube-vnet.fullname" . }}-system-vnet-protected
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   ["kube-vnet.lhns.de"]
        apiVersions: ["v1alpha1"]
        operations:  ["CREATE", "UPDATE", "DELETE"]
        resources:   ["virtualnetworks"]
  variables:
    - name: operatorUser
      expression: {{ printf "\"system:serviceaccount:%s:%s\""
        (.Release.Namespace)
        (include "kube-vnet.serviceAccountName" .) | quote }}
    # Whether the affected object carries kube-vnet.system/managed-by=kube-vnet. On CREATE
    # only `object` is populated, on DELETE only `oldObject`, on UPDATE both;
    # we OR them so any of the three operations matches an attempt to either
    # set or carry the system label.
    - name: isSystemVnet
      expression: |
        (object != null && object.metadata.?labels["kube-vnet.system/managed-by"].orValue("") == "kube-vnet") ||
        (oldObject != null && oldObject.metadata.?labels["kube-vnet.system/managed-by"].orValue("") == "kube-vnet")
    # The two reserved names. `request.name` is uniform across CREATE/UPDATE/
    # DELETE (object.metadata.name is empty on DELETE).
    - name: isReservedName
      expression: 'request.name == "namespace" || request.name == "cluster"'
  validations:
    - expression: |
        request.userInfo.username == variables.operatorUser ||
        (!variables.isSystemVnet && !variables.isReservedName)
      message: "VirtualNetwork names `namespace` and `cluster` are reserved for operator-managed system vnets, as is the `kube-vnet.system/managed-by=kube-vnet` label. Only the operator may create, update, or delete these. See ADR 0030."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kube-vnet.fullname" . }}-system-vnet-protected
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  policyName: {{ include "kube-vnet.fullname" . }}-system-vnet-protected
  validationActions: [Deny]
{{- end }}
