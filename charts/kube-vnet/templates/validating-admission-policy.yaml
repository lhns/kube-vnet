{{- /*
Validating admission for kube-vnet join-label values.

Rejects Pod create/update where any label key matching `kube-vnet/net.*`
has a value outside the recognized direction enum: `both`, `ingress`,
`egress`, `none`. Legacy aliases `true`, `false`, and the empty string
were dropped per ADR 0030 (and the ADR 0021 2026-05-05 addendum).

Requires Kubernetes >= 1.30 (where ValidatingAdmissionPolicy is GA). On
older clusters this template renders nothing; the operator's vnet-status
`UnknownDirection` reason still catches bad values at reconcile time.

See ADR 0027 and ADR 0030.
*/}}
{{- /* VAP is GA in admissionregistration.k8s.io/v1 since Kubernetes 1.30. */ -}}
{{- $kubeMajor := int .Capabilities.KubeVersion.Major -}}
{{- $kubeMinor := int (regexReplaceAll "[^0-9]" .Capabilities.KubeVersion.Minor "") -}}
{{- if or (gt $kubeMajor 1) (and (eq $kubeMajor 1) (ge $kubeMinor 30)) }}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: {{ include "kube-vnet.fullname" . }}-join-label-direction
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   [""]
        apiVersions: ["v1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["pods"]
  variables:
    # CEL expressions, not string literals — the values these variables
    # take must themselves be valid CEL. Wrap the rendered prefix in inner
    # double-quotes so CEL parses it as a string literal rather than as
    # `kube-vnet / net .` (identifier / division / identifier / accessor).
    - name: joinKeyPrefix
      expression: '"kube-vnet/net."'
    - name: validValues
      expression: '["both","ingress","egress","none"]'
  validations:
    - expression: |
        object.metadata.labels.all(k,
          !k.startsWith(variables.joinKeyPrefix) ||
          object.metadata.labels[k] in variables.validValues)
      message: "kube-vnet join label values must be one of: both, ingress, egress, none. The legacy true/false/empty aliases were removed per ADR 0030. See https://github.com/lhns/kube-vnet/blob/main/docs/reference/labels-and-annotations.md."
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: {{ include "kube-vnet.fullname" . }}-join-label-direction
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  policyName: {{ include "kube-vnet.fullname" . }}-join-label-direction
  validationActions: [Deny]
{{- end }}
