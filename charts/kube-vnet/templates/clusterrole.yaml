{{- /*
Source of truth for these rules is config/rbac/role.yaml, which is
generated by `make manifests` (controller-gen) from the
+kubebuilder:rbac annotations on the controllers in internal/controller/.

This template duplicates those rules verbatim because the chart's
ClusterRole uses Helm-templated naming (release-aware fullname) that
controller-gen doesn't know how to emit. The drift test in
internal/controller/chart_rbac_test.go renders this template and
compares it (rule content, order-insensitive) to config/rbac/role.yaml —
keep the two in sync, or CI fails.
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-vnet.fullname" . }}
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [namespaces, services]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, patch, update, watch]
  # ADR 0041 — apiserver-reachable Service auto-allow. Watches the four
  # cluster-scoped resources that declare "the apiserver dials this Service":
  # admission webhooks (validating + mutating), CRD conversion webhooks,
  # APIServices. Read-only.
  - apiGroups: [admissionregistration.k8s.io]
    resources: [mutatingwebhookconfigurations, validatingwebhookconfigurations]
    verbs: [get, list, watch]
  - apiGroups: [apiextensions.k8s.io]
    resources: [customresourcedefinitions]
    verbs: [get, list, watch]
  - apiGroups: [apiregistration.k8s.io]
    resources: [apiservices]
    verbs: [get, list, watch]
  - apiGroups: [kube-vnet.lhns.de]
    resources:
      [
        clustervirtualnetworkbaselines,
        virtualnetworkbaselines,
        virtualnetworkbindings,
      ]
    verbs: [get, list, watch]
  - apiGroups: [kube-vnet.lhns.de]
    resources:
      [
        virtualnetworkbindings/finalizers,
        virtualnetworks/finalizers,
      ]
    verbs: [update]
  - apiGroups: [kube-vnet.lhns.de]
    resources:
      [
        clustervirtualnetworkbaselines/status,
        virtualnetworkbaselines/status,
        virtualnetworkbindings/status,
        virtualnetworks/status,
      ]
    verbs: [get, patch, update]
  - apiGroups: [kube-vnet.lhns.de]
    resources: [virtualnetworks]
    verbs: [create, delete, get, list, patch, update, watch]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-vnet.fullname" . }}
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-vnet.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-vnet.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
