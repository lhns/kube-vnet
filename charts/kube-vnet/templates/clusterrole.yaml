{{- /*
Source of truth for these rules is config/rbac/role.yaml, which is
generated by `make manifests` (controller-gen) from the
+kubebuilder:rbac annotations on the controllers in internal/controller/.

This template duplicates those rules verbatim because the chart's
ClusterRole uses Helm-templated naming (release-aware fullname) that
controller-gen doesn't know how to emit. A drift test in
internal/controller/chart_manifests_integration_test.go renders this
template and compares it to config/rbac/role.yaml — keep the two in
sync, or CI fails.

Per-rule order matches controller-gen's output (apiGroups/resources/verbs
each sorted lexically; rules sorted by their first triple). Don't
hand-reorder.
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-vnet.fullname" . }}
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [namespaces]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, patch, update, watch]
  - apiGroups: [kube-vnet.lhns.de]
    resources: [clustervirtualnetworkbindings, virtualnetworkbindings]
    verbs: [get, list, watch]
  - apiGroups: [kube-vnet.lhns.de]
    resources:
      [
        clustervirtualnetworkbindings/finalizers,
        virtualnetworkbindings/finalizers,
        virtualnetworks/finalizers,
      ]
    verbs: [update]
  - apiGroups: [kube-vnet.lhns.de]
    resources:
      [
        clustervirtualnetworkbindings/status,
        virtualnetworkbindings/status,
        virtualnetworks/status,
      ]
    verbs: [get, patch, update]
  - apiGroups: [kube-vnet.lhns.de]
    resources: [virtualnetworks]
    verbs: [create, get, list, patch, update, watch]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-vnet.fullname" . }}
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-vnet.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-vnet.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
