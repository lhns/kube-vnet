apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-vnet.fullname" . }}
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
  - apiGroups: [""]
    resources: [namespaces, pods]
    verbs: [get, list, watch]
  - apiGroups: [kube-vnet.lhns.de]
    resources: [virtualnetworks, virtualnetworkbindings]
    verbs: [get, list, watch]
  - apiGroups: [kube-vnet.lhns.de]
    resources: [virtualnetworks/finalizers, virtualnetworkbindings/finalizers]
    verbs: [update]
  - apiGroups: [kube-vnet.lhns.de]
    resources: [virtualnetworks/status, virtualnetworkbindings/status]
    verbs: [get, patch, update]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [create, delete, get, list, patch, update, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-vnet.fullname" . }}
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-vnet.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-vnet.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
