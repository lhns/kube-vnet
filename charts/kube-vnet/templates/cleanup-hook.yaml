{{- /*
Pre-delete hook bundle (ADR 0036).

`helm uninstall` does NOT remove operator-generated NetworkPolicies — they
were created at runtime by the operator, not rendered by the chart. Without
this hook the deny-all baselines and per-vnet membership policies survive
uninstall and keep enforcing, leaving the cluster in a stuck deny-all state
with no controller to recover from any state change.

This template ships a one-shot Job + minimal RBAC bundle, all tagged
`helm.sh/hook: pre-delete`. The Job runs `kubectl delete networkpolicy -A
--selector kube-vnet.system/managed-by=kube-vnet` before Helm tears down the
release's chart-managed resources. After it succeeds, Helm proceeds with
the normal uninstall and the cluster collapses back to Kubernetes
default-allow.

CRDs, CR instances, and the system-vnet CRs are intentionally NOT touched —
they have `helm.sh/resource-policy: keep` (CRDs, ClusterVirtualNetworkBaseline)
or are runtime-managed (system vnets) and survive uninstall by design so a
subsequent `helm install` lands cleanly.

Toggle via `cleanup.enabled` (default true). Disable only for a controlled
migration where you need to preserve the policy set across a brief operator
outage — and clean up manually afterwards:

    kubectl delete networkpolicy -A -l kube-vnet.system/managed-by=kube-vnet

See ADR 0036 for the full rationale.
*/ -}}
{{- if .Values.cleanup.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "kube-vnet.fullname" . }}-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kube-vnet.fullname" . }}-cleanup
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
rules:
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies]
    verbs: [list, delete, deletecollection]
  # Cluster-wide because the hook's ClusterRoleBinding is cluster-wide;
  # in practice the operator Deployment is in {{ .Release.Namespace }}
  # and we only act there. Used by the stop-operator initContainer to
  # delete the operator Deployment before policies, so the operator's
  # drift correction can't race-recreate the policies the next
  # container is about to delete.
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, delete]
  # Used by wait-for-operator-shutdown to confirm pod termination
  # before proceeding to the policy delete.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kube-vnet.fullname" . }}-cleanup
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "-10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kube-vnet.fullname" . }}-cleanup
subjects:
  - kind: ServiceAccount
    name: {{ include "kube-vnet.fullname" . }}-cleanup
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kube-vnet.fullname" . }}-cleanup
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-delete
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "kube-vnet.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: cleanup
    spec:
      serviceAccountName: {{ include "kube-vnet.fullname" . }}-cleanup
      restartPolicy: Never
      # Three-step sequence guards against the operator's drift
      # correction racing the policy delete. The operator is still
      # running when pre-delete hooks fire (Helm only tears down
      # chart-managed resources after the hook returns); if we just
      # `kubectl delete networkpolicy` first, the operator watches the
      # delete events and re-applies the policies via SSA before Helm
      # finishes uninstalling, leaving orphan baselines stuck in
      # deny-all forever.
      #
      # 1. Delete the operator Deployment so its controllers can't
      #    react to further events. Helm will see the Deployment
      #    already gone during the main teardown — fine.
      # 2. Wait for the operator pod(s) to actually terminate (delete
      #    is async; pods are cascade-deleted by the controller manager).
      # 3. Now delete the policies. Nothing left to race with.
      initContainers:
        - name: stop-operator
          image: "{{ .Values.cleanup.image.repository }}:{{ .Values.cleanup.image.tag }}"
          imagePullPolicy: {{ .Values.cleanup.image.pullPolicy | default "IfNotPresent" }}
          command: [kubectl]
          args:
            - delete
            - deployment
            - {{ include "kube-vnet.fullname" . }}
            - --namespace
            - {{ .Release.Namespace }}
            - --ignore-not-found
            - --wait=true
            - --timeout=60s
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities: { drop: [ALL] }
        - name: wait-for-operator-shutdown
          image: "{{ .Values.cleanup.image.repository }}:{{ .Values.cleanup.image.tag }}"
          imagePullPolicy: {{ .Values.cleanup.image.pullPolicy | default "IfNotPresent" }}
          command: [kubectl]
          # Component=controller scopes to the operator pods specifically
          # — our own cleanup Job pod carries component=cleanup so we
          # don't wait on ourselves.
          args:
            - wait
            - --for=delete
            - pod
            - --selector
            - app.kubernetes.io/name={{ include "kube-vnet.name" . }},app.kubernetes.io/component=controller
            - --namespace
            - {{ .Release.Namespace }}
            - --timeout=60s
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities: { drop: [ALL] }
      containers:
        - name: cleanup
          image: "{{ .Values.cleanup.image.repository }}:{{ .Values.cleanup.image.tag }}"
          imagePullPolicy: {{ .Values.cleanup.image.pullPolicy | default "IfNotPresent" }}
          # Invoke kubectl directly (no `sh -c` wrapper). The
          # registry.k8s.io/kubectl image is distroless — it ships the
          # kubectl binary alone with no shell. The Job's exit code is
          # kubectl's exit code; the pod's stdout shows what was deleted
          # (kubectl prints "networkpolicy.networking.k8s.io/<name> deleted"
          # per match). That's the diagnostic surface we need; no need for
          # echo wrappers.
          command:
            - kubectl
          args:
            - delete
            - networkpolicy
            - --all-namespaces
            - --selector
            - kube-vnet.system/managed-by=kube-vnet
            - --ignore-not-found
            - --wait=true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            capabilities:
              drop: [ALL]
{{- end }}
