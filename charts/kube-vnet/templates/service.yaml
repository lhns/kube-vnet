{{- if .Values.metricsService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kube-vnet.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  type: {{ .Values.metricsService.type }}
  ports:
    - name: metrics
      port: {{ .Values.metricsService.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "kube-vnet.selectorLabels" . | nindent 4 }}
{{- end }}
