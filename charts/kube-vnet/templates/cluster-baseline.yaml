{{- /*
Seeded ClusterVirtualNetworkBaseline (ADR 0031). The chart populates the
singleton named `default` from operator.clusterBaseline.

XOR validation: when create=true, exactly one of `ingressIsolationLevel`
or `memberships` must be set. Both → fail (ambiguous). Neither → fail
(no default; force a deliberate security choice). When create=false the
chart emits nothing — the user manages the CR elsewhere.

The `helm.sh/resource-policy: keep` annotation prevents `helm uninstall`
from deleting the CR. Subsequent `helm upgrade` re-renders this template;
hand-edits via kubectl are overwritten unless you also update the chart
values to match.

System-vnet keys (`namespace`, `cluster`) are rendered WITHOUT a
`namespace:` attribute — it is optional and inferred per ADR 0043:
`cluster` resolves to the cluster-wide singleton, and `namespace`
resolves to each pod's OWN namespace.

Do not "helpfully" add the release namespace back. The `cluster` vnet
does live there, but the per-namespace `namespace` vnet does NOT: the
SystemVnetReconciler creates one in every *managed* namespace, and the
release namespace is unmanaged, so it has none. Writing it would name a
vnet that doesn't exist, and the ref is now honored rather than silently
rewritten — every pod's membership would be dropped.
*/ -}}
{{- $cb := .Values.operator.clusterBaseline -}}
{{- if $cb.create -}}
{{- $hasLevel := and $cb.ingressIsolationLevel (ne $cb.ingressIsolationLevel "") -}}
{{- $hasMemberships := and $cb.memberships (gt (len $cb.memberships) 0) -}}
{{- if and $hasLevel $hasMemberships -}}
{{- fail "operator.clusterBaseline: set EXACTLY ONE of ingressIsolationLevel or memberships, not both" -}}
{{- end -}}
{{- if and (not $hasLevel) (not $hasMemberships) -}}
{{- fail "operator.clusterBaseline: set ingressIsolationLevel (pod|namespace|cluster) OR memberships (explicit map). No default — pick deliberately." -}}
{{- end -}}
apiVersion: kube-vnet.lhns.de/v1alpha1
kind: ClusterVirtualNetworkBaseline
metadata:
  name: default
  annotations:
    helm.sh/resource-policy: keep
    # Apply this CR in Helm's post-install / post-upgrade phase rather than
    # alongside the main release manifest. Helm's discovery cache isn't
    # always refreshed between installing the ClusterVirtualNetworkBaseline
    # CRD (in the main phase) and applying CRs of that kind in the same
    # release — fresh-install attempts (CI's e2e-helm lane and any first-
    # time real install) hit "no matches for kind" otherwise. The hook
    # runs after Helm refreshes discovery, guaranteeing the CRD exists.
    # See ADR 0032 for the broader CRD-lifecycle reasoning.
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
  labels:
    {{- include "kube-vnet.labels" . | nindent 4 }}
spec:
  memberships:
{{- if $hasMemberships }}
  {{- range $key, $direction := $cb.memberships }}
    {{- $parts := splitList "." $key }}
    {{- if eq (len $parts) 1 }}
    {{- /* Bare key = system vnet. `namespace` is omitted deliberately (ADR 0043). */}}
    - virtualNetworkRef:
        name: {{ $key }}
      direction: {{ $direction }}
    {{- else }}
    - virtualNetworkRef:
        name: {{ index $parts 1 }}
        namespace: {{ index $parts 0 }}
      direction: {{ $direction }}
    {{- end }}
  {{- end }}
{{- else if eq $cb.ingressIsolationLevel "pod" }}
    - virtualNetworkRef:
        name: namespace
      direction: default-egress
    - virtualNetworkRef:
        name: cluster
      direction: default-egress
{{- else if eq $cb.ingressIsolationLevel "namespace" }}
    - virtualNetworkRef:
        name: namespace
      direction: default-both
    - virtualNetworkRef:
        name: cluster
      direction: default-egress
{{- else if eq $cb.ingressIsolationLevel "cluster" }}
    - virtualNetworkRef:
        name: namespace
      direction: default-both
    - virtualNetworkRef:
        name: cluster
      direction: default-both
{{- else }}
    {{- fail (printf "operator.clusterBaseline.ingressIsolationLevel must be one of: pod, namespace, cluster (got %q)" $cb.ingressIsolationLevel) }}
{{- end }}
{{- end }}
