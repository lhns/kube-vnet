# Default values for kube-vnet.

image:
  repository: ghcr.io/lhns/kube-vnet
  # tag overrides Chart.appVersion when set.
  tag: ""
  pullPolicy: IfNotPresent
  # imagePullSecrets is a list of references to secrets in the same namespace.
  pullSecrets: []

# Number of operator replicas. Leader election is on by default — one replica
# is normal; scale to 2 for HA across nodes.
replicaCount: 1

# Operator flags. See README "Configuration" for the full description of each.
operator:
  # Namespaces the operator never touches at all (no baseline, no membership
  # policies, pods not eligible peers in any vnet, bindings ignored). Mirrors
  # the per-namespace `kube-vnet/disabled=true` annotation. The Helm release
  # namespace is always added implicitly via POD_NAMESPACE.
  #
  # Default lists only kube-system — the one system namespace with
  # cluster-critical pods (CoreDNS, metrics-server) where a deny-all baseline
  # bites. kube-public and kube-node-lease hold no pods, so managing them is
  # inert; they are not disabled by default. The operator stays out of a
  # disabled namespace entirely — no policies, no system vnets, no resolution
  # stamping.
  #
  # To enroll kube-system (e.g. to segment DNS or bring its pods into vnets),
  # remove it from this list. When you do, the chart automatically renders a
  # NetworkPolicy that keeps CoreDNS reachable on :53 (see dnsCarveout below
  # and ADR 0042) — otherwise the deny-all baseline would kill cluster DNS.
  disabledNamespaces:
    - kube-system

  # CIDR allowed as source for auto-allow NetworkPolicies targeting Services
  # the apiserver reaches in-cluster — admission webhooks (cert-manager,
  # kyverno, gatekeeper, etc.), aggregated APIServices (metrics-server,
  # custom-metrics-apiserver), CRD conversion webhooks. See ADR 0041.
  #
  # Default 0.0.0.0/0 matches the cluster's no-NetworkPolicy baseline:
  # in plain K8s, anyone in the cluster can reach any Service on any port,
  # so a 0.0.0.0/0 ingress allow on the webhook port doesn't make things
  # worse than the default state. Webhook servers and APIServices
  # authenticate the apiserver via TLS+CA — transport-layer auth makes
  # wide CIDRs safe in practice.
  #
  # Tighten if your cluster's pod network is exposed (the pod CIDR is
  # reachable from the public internet) and you want a narrower allow.
  # Set to your control-plane node CIDR, e.g. "10.1.2.0/24".
  apiserverSourceCIDR: "0.0.0.0/0"

  # ClusterVirtualNetworkBaseline seeded by the chart (ADR 0031). The CR is
  # named `default` (singleton) and is annotated `helm.sh/resource-policy:
  # keep` so `helm uninstall` doesn't drop it. Subsequent `helm upgrade`
  # re-renders it from this block; if you've hand-edited the CR via
  # kubectl, your edits are overwritten.
  clusterBaseline:
    # Whether the chart creates the seeded ClusterVirtualNetworkBaseline.
    # Set to false if you manage that CR outside Helm (Argo, GitOps, kubectl).
    create: true

    # When create=true: set EXACTLY ONE of `ingressIsolationLevel` or
    # `memberships`. Both → install fails (ambiguous). Neither → install
    # fails (no default; force a deliberate security choice).
    #
    # ingressIsolationLevel — preset for the common cases. One of:
    #   pod       — namespace=default-egress, cluster=default-egress
    #               Strict: ingress only via explicit binding/label; egress
    #               permitted (DNS, image pulls, etc.).
    #   namespace — namespace=default-both,   cluster=default-egress
    #               Same-NS pods reachable; cross-NS egress only.
    #   cluster   — namespace=default-both,   cluster=default-both
    #               No isolation (allow-all).
    ingressIsolationLevel: ""

    # memberships — explicit override for users whose desired baseline
    # doesn't match any preset. Map of <vnet-key> → <direction>:
    #   bare name (e.g. `namespace`, `cluster`) → system vnet, lives in the
    #     operator's release namespace.
    #   <namespace>.<name>                       → user vnet in that NS.
    # Direction is the eight-value enum (bare or default-*).
    # Bare directions are enforced; default-* are override-able by lower tiers.
    memberships: null
    # Example:
    # memberships:
    #   namespace: default-both
    #   cluster: default-egress
    #   platform.payments: ingress
  # Enable leader election. Recommended on; harmless overhead with one replica
  # and required for safe multi-replica HA.
  leaderElect: true
  metricsBindAddress: ":8080"
  healthProbeBindAddress: ":8081"

# Cluster DNS ingress carve-out (ADR 0042). A chart-shipped NetworkPolicy that
# keeps CoreDNS reachable on :53 when its namespace is managed by kube-vnet.
#
# DNS must be reachable from every pod (and from hostNetwork clients on the
# node IP) regardless of vnet membership — universal reachability the vnet
# model can't express — so this is a raw NetworkPolicy with ipBlock 0.0.0.0/0,
# the same shape the auto-allow families use. It carries only chart labels, so
# the operator never touches it.
dnsCarveout:
  # Rendered automatically when `namespace` below is NOT in
  # operator.disabledNamespaces (i.e. cluster DNS is being managed).
  #   null  → auto (render iff the DNS namespace is managed)  [default]
  #   false → never render
  #   true  → always render, even while the namespace is disabled
  enabled: null
  # Namespace CoreDNS runs in. Also the namespace whose managed/disabled state
  # gates auto-rendering.
  namespace: kube-system
  # Pod label selector for the DNS pods. `k8s-app: kube-dns` is the canonical
  # label set by both kube-dns and CoreDNS.
  selector:
    k8s-app: kube-dns
  # Ingress ports to open from 0.0.0.0/0. Add `{ protocol: TCP, port: 9153 }`
  # to also expose CoreDNS metrics.
  ports:
    - { protocol: UDP, port: 53 }
    - { protocol: TCP, port: 53 }

# End-user RBAC for the kube-vnet CRDs (ADR 0031). When `aggregate: true`
# (default), the chart ships ClusterRoles labeled with the standard
# `rbac.authorization.k8s.io/aggregate-to-{admin,edit,view}` markers for
# the namespace-scoped CRDs (VirtualNetwork, VirtualNetworkBinding,
# VirtualNetworkBaseline). Anyone bound to the upstream `admin`/`edit`
# ClusterRole within a namespace gets read+write on those CRDs in that
# namespace; `view` gets read.
#
# ClusterVirtualNetworkBaseline (cluster-scoped) is NOT aggregated — only
# cluster-admin can write it by default. The chart also ships an unbound
# editor + viewer pair for that resource so a cluster-admin can delegate
# read or write via their own ClusterRoleBinding.
#
# Set `aggregate: false` to skip all the above and manage RBAC yourself.
rbac:
  aggregate: true

# Pod-level scheduling.
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

# Pod & container security context. Defaults match the upstream manifests:
# non-root, read-only root FS, all caps dropped, RuntimeDefault seccomp.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource requests / limits.
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Probes; tuned for a fast-start Go binary.
livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10

# Set to true to expose the metrics endpoint via a Service. Off by default —
# Prometheus operator users typically discover via PodMonitor instead.
metricsService:
  enabled: false
  port: 8080
  type: ClusterIP

# PodMonitor for Prometheus operator. Off unless explicitly enabled.
podMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# Extra labels applied to every templated resource.
commonLabels: {}

# Extra annotations applied only to the operator Pod.
podAnnotations: {}

# Termination grace period for the operator Pod.
terminationGracePeriodSeconds: 10

# Helm pre-delete hook that runs `kubectl delete networkpolicy --selector
# kube-vnet.system/managed-by=kube-vnet` cluster-wide on `helm uninstall`.
#
# Without it, the deny-all baselines and per-vnet membership policies the
# operator generated at runtime survive uninstall and keep enforcing — pods
# end up stuck in deny-all mode with no controller to recover them. See
# ADR 0036.
#
# Disable only for a controlled migration where you need to preserve the
# existing policy set across a brief operator outage. Then clean up manually:
#   kubectl delete networkpolicy -A -l kube-vnet.system/managed-by=kube-vnet
cleanup:
  enabled: true
  image:
    # Official kubectl image published by the Kubernetes SIG Release team
    # (not a single-vendor dep). Available from K8s 1.30+ release cycle.
    # See: https://github.com/kubernetes/release/blob/master/cmd/kubepkg/cmd/kubectl.go
    repository: registry.k8s.io/kubectl
    tag: "v1.30.0"
    pullPolicy: IfNotPresent
