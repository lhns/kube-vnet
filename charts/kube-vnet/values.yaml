# Default values for kube-vnet.

image:
  repository: ghcr.io/lhns/kube-vnet
  # tag overrides Chart.appVersion when set.
  tag: ""
  pullPolicy: IfNotPresent
  # imagePullSecrets is a list of references to secrets in the same namespace.
  pullSecrets: []

# Number of operator replicas. Leader election is on by default — one replica
# is normal; scale to 2 for HA across nodes.
replicaCount: 1

# Operator flags. See README "Configuration" for the full description of each.
operator:
  # Label-key prefix for join labels. Must end with "/".
  labelPrefix: "kube-vnet/"

  # Namespaces the operator never touches at all (no baseline, no membership
  # policies, pods not eligible peers in any vnet, bindings ignored). Mirrors
  # the per-namespace `kube-vnet/disabled=true` annotation. The Helm release
  # namespace is always added implicitly via POD_NAMESPACE.
  #
  # Default empty: the system namespaces (kube-system, kube-public,
  # kube-node-lease) are no longer here. They live in
  # ingressIsolation.namespaceOverrides.none below so the operator still
  # discovers any deliberate joiner there.
  disabledNamespaces: []
  # DEPRECATED: alias for disabledNamespaces. Retained for one release cycle.
  excludedNamespaces: []

  ingressIsolation:
    # REQUIRED. One of: none | namespace | pod.
    #   none      — no baseline; ingress unrestricted by kube-vnet.
    #   namespace — baseline allows ingress from same-namespace pods.
    #   pod       — baseline denies all ingress; only vnet membership policies
    #               grant allows.
    # No default — `helm install/upgrade` fails fast if this is left unset.
    # Pick deliberately.
    mode: ""

    # Per-namespace overrides of `mode`. The per-namespace
    # `kube-vnet/ingress-isolation` annotation still takes precedence over
    # both `mode` and these lists.
    #
    # Default puts the three system namespaces in `none` so a non-`none`
    # cluster-wide mode never lands a deny-all baseline on the control
    # plane. Override or extend as needed.
    namespaceOverrides:
      none:
        - kube-system
        - kube-public
        - kube-node-lease
      namespace: []
      pod: []
    # DEPRECATED: replaced by namespaceOverrides.{none,namespace,pod}.
    # Retained for one release cycle.
    forceNone: []
    forceNamespace: []
    forcePod: []
  # DEPRECATED: alias for ingressIsolation.mode=pod when set to true.
  # Retained for one release cycle; switch to ingressIsolation.mode.
  defaultDenyEverywhere: false
  # Enable leader election. Recommended on; harmless overhead with one replica
  # and required for safe multi-replica HA.
  leaderElect: true
  metricsBindAddress: ":8080"
  healthProbeBindAddress: ":8081"

# Pod-level scheduling.
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

# Pod & container security context. Defaults match the upstream manifests:
# non-root, read-only root FS, all caps dropped, RuntimeDefault seccomp.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource requests / limits.
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Probes; tuned for a fast-start Go binary.
livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10

# Set to true to expose the metrics endpoint via a Service. Off by default —
# Prometheus operator users typically discover via PodMonitor instead.
metricsService:
  enabled: false
  port: 8080
  type: ClusterIP

# PodMonitor for Prometheus operator. Off unless explicitly enabled.
podMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# Extra labels applied to every templated resource.
commonLabels: {}

# Extra annotations applied only to the operator Pod.
podAnnotations: {}

# Termination grace period for the operator Pod.
terminationGracePeriodSeconds: 10
