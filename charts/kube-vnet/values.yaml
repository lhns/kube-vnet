# Default values for kube-vnet.

image:
  repository: ghcr.io/lhns/kube-vnet
  # tag overrides Chart.appVersion when set.
  tag: ""
  pullPolicy: IfNotPresent
  # imagePullSecrets is a list of references to secrets in the same namespace.
  pullSecrets: []

# Number of operator replicas. Leader election is on by default — one replica
# is normal; scale to 2 for HA across nodes.
replicaCount: 1

# Operator flags. See README "Configuration" for the full description of each.
operator:
  # Label-key prefix for join labels. Must end with "/".
  labelPrefix: "kube-vnet/"

  # Namespaces the operator never touches at all (no baseline, no membership
  # policies, pods not eligible peers in any vnet, bindings ignored). Mirrors
  # the per-namespace `kube-vnet/disabled=true` annotation. The Helm release
  # namespace is always added implicitly via POD_NAMESPACE.
  #
  # Default lists the system namespaces (kube-system, kube-public,
  # kube-node-lease). The operator stays out entirely there — no policies,
  # no system vnets, no resolution stamping. To enroll a system-namespace
  # pod in a vnet, remove the namespace from this list.
  disabledNamespaces:
    - kube-system
    - kube-public
    - kube-node-lease

  # Comma-separated vnet names whose receivers (kube-vnet.system/net.<vnet>
  # In [both,ingress]) are excluded from the deny-all baseline. Default
  # `cluster` so pods on the cluster system-vnet (allow-all by convention)
  # don't get a redundant baseline policy. ADR 0030.
  elideBaselineFor: cluster

  # Comma-separated <vnet>=<direction> pairs that every pod in every managed
  # namespace joins by default. The two recognized vnet keys are the system
  # vnets `namespace` and `cluster`. Pod labels and VirtualNetworkBindings
  # add to or override these defaults. Default empty (no auto-memberships).
  # Per ADR 0030. Example: `namespace=both,cluster=egress`.
  defaultMemberships: ""
  # Enable leader election. Recommended on; harmless overhead with one replica
  # and required for safe multi-replica HA.
  leaderElect: true
  metricsBindAddress: ":8080"
  healthProbeBindAddress: ":8081"

# Pod-level scheduling.
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""

# Pod & container security context. Defaults match the upstream manifests:
# non-root, read-only root FS, all caps dropped, RuntimeDefault seccomp.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Resource requests / limits.
resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

# Probes; tuned for a fast-start Go binary.
livenessProbe:
  initialDelaySeconds: 15
  periodSeconds: 20
readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10

# Set to true to expose the metrics endpoint via a Service. Off by default —
# Prometheus operator users typically discover via PodMonitor instead.
metricsService:
  enabled: false
  port: 8080
  type: ClusterIP

# PodMonitor for Prometheus operator. Off unless explicitly enabled.
podMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  labels: {}

# Extra labels applied to every templated resource.
commonLabels: {}

# Extra annotations applied only to the operator Pod.
podAnnotations: {}

# Termination grace period for the operator Pod.
terminationGracePeriodSeconds: 10
