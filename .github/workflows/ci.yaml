name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./... -count=1
      - name: verify generated code is up to date
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.16.5
          $(go env GOPATH)/bin/controller-gen object paths="./api/v1alpha1/..."
          $(go env GOPATH)/bin/controller-gen crd paths="./api/v1alpha1/..." output:crd:dir=config/crd/bases
          $(go env GOPATH)/bin/controller-gen rbac:roleName=kube-vnet-manager paths="./internal/controller/..." output:rbac:dir=config/rbac
          git diff --exit-code

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/lhns/kube-vnet:ci
