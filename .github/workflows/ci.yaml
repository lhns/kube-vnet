name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (unit)
        run: go test ./... -count=1
      - name: verify generated code is up to date
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.16.5
          $(go env GOPATH)/bin/controller-gen object paths="./api/v1alpha1/..."
          $(go env GOPATH)/bin/controller-gen crd paths="./api/v1alpha1/..." output:crd:dir=config/crd/bases
          $(go env GOPATH)/bin/controller-gen rbac:roleName=kube-vnet-manager paths="./internal/controller/..." output:rbac:dir=config/rbac
          git diff --exit-code

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.19
      - name: cache envtest assets
        uses: actions/cache@v4
        with:
          path: ~/.local/share/kubebuilder-envtest
          key: envtest-${{ runner.os }}-1.31.0
      - name: run integration tests
        run: |
          ASSETS=$($(go env GOPATH)/bin/setup-envtest use 1.31.0 -p path)
          KUBEBUILDER_ASSETS="$ASSETS" go test -tags integration ./internal/controller/... -count=1 -timeout 300s -v

  docker:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/lhns/kube-vnet:ci
