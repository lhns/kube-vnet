name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (unit)
        run: go test ./... -count=1
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.3
      - name: verify generated code is up to date
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.16.5
          $(go env GOPATH)/bin/controller-gen object paths="./api/v1alpha1/..."
          $(go env GOPATH)/bin/controller-gen crd paths="./api/v1alpha1/..." output:crd:dir=config/crd/bases
          $(go env GOPATH)/bin/controller-gen rbac:roleName=kube-vnet-manager paths="./internal/controller/..." output:rbac:dir=config/rbac
          # Re-render the chart-derived kustomize VAPs (Stage D / ADR 0030).
          make render-kustomize-vaps
          git diff --exit-code

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.3
      - name: install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.19
      - name: cache envtest assets
        uses: actions/cache@v6
        with:
          path: ~/.local/share/kubebuilder-envtest
          key: envtest-${{ runner.os }}-1.31.0
      - name: run integration tests
        run: |
          ASSETS=$($(go env GOPATH)/bin/setup-envtest use 1.31.0 -p path)
          KUBEBUILDER_ASSETS="$ASSETS" go test -tags integration ./internal/controller/... -count=1 -timeout 300s -v

  docker:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/lhns/kube-vnet:ci
      - name: trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/lhns/kube-vnet:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'

  trivy-fs:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v7
      - name: trivy filesystem scan (sources + go.sum)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          skip-dirs: 'docs,test'

  helm:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.3
      - name: helm lint
        run: helm lint charts/kube-vnet
      - name: helm template (each isolationLevel preset)
        run: |
          for level in pod namespace cluster; do
            helm template testrelease charts/kube-vnet --kube-version 1.31.0 \
              --set operator.clusterBaseline.ingressIsolationLevel=$level > /dev/null
          done
      - name: helm template (full options on, explicit memberships override)
        run: |
          helm template testrelease charts/kube-vnet --kube-version 1.31.0 \
            --set operator.clusterBaseline.memberships.namespace=default-both \
            --set operator.clusterBaseline.memberships.cluster=default-egress \
            --set podMonitor.enabled=true \
            --set metricsService.enabled=true > /dev/null
