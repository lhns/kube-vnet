name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test (unit)
        run: go test ./... -count=1
      - name: verify generated code is up to date
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.16.5
          $(go env GOPATH)/bin/controller-gen object paths="./api/v1alpha1/..."
          $(go env GOPATH)/bin/controller-gen crd paths="./api/v1alpha1/..." output:crd:dir=config/crd/bases
          $(go env GOPATH)/bin/controller-gen rbac:roleName=kube-vnet-manager paths="./internal/controller/..." output:rbac:dir=config/rbac
          git diff --exit-code

  integration:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: install setup-envtest
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.19
      - name: cache envtest assets
        uses: actions/cache@v5
        with:
          path: ~/.local/share/kubebuilder-envtest
          key: envtest-${{ runner.os }}-1.31.0
      - name: run integration tests
        run: |
          ASSETS=$($(go env GOPATH)/bin/setup-envtest use 1.31.0 -p path)
          KUBEBUILDER_ASSETS="$ASSETS" go test -tags integration ./internal/controller/... -count=1 -timeout 300s -v

  docker:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/lhns/kube-vnet:ci
      - name: trivy image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/lhns/kube-vnet:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'

  trivy-fs:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - name: trivy filesystem scan (sources + go.sum)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          skip-dirs: 'docs,test'

  helm:
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - name: helm lint
        run: helm lint charts/kube-vnet
      - name: helm template (mode=none)
        run: |
          helm template testrelease charts/kube-vnet --kube-version 1.31.0 \
            --set operator.ingressIsolation.mode=none > /dev/null
      - name: helm template (mode=pod, full options on)
        run: |
          helm template testrelease charts/kube-vnet --kube-version 1.31.0 \
            --set operator.ingressIsolation.mode=pod \
            --set podMonitor.enabled=true \
            --set metricsService.enabled=true > /dev/null
      - name: helm template (no mode → required error)
        run: |
          if helm template testrelease charts/kube-vnet --kube-version 1.31.0 > /dev/null 2>&1; then
            echo "expected helm template to fail without operator.ingressIsolation.mode" >&2
            exit 1
          fi
