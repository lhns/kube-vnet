name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/lhns/kube-vnet:${{ github.ref_name }}
            ghcr.io/lhns/kube-vnet:latest
      - name: render release.yaml
        run: |
          kubectl_version=v1.31.0
          curl -sLo kubectl "https://dl.k8s.io/release/${kubectl_version}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          ./kubectl kustomize config/default > release.yaml
      - name: create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release.yaml
          generate_release_notes: true
