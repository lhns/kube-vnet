name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Two CNI lanes run in parallel: faster wall-clock feedback per PR
# (~max(kube-router, calico) instead of the sum). We accept the extra CI
# minutes when one lane fails because the time saved on the common case
# (both pass) is the larger win.

jobs:
  e2e-kube-router:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: create kind cluster (no default CNI)
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kube-vnet-e2e-kr
          config: test/e2e/kind-config.yaml
          wait: 60s

      - name: install kube-router
        run: |
          set -euxo pipefail
          kubectl apply -f https://raw.githubusercontent.com/cloudnativelabs/kube-router/master/daemonset/kubeadm-kuberouter.yaml
          kubectl rollout status -n kube-system ds/kube-router --timeout=180s
          kubectl wait --for=condition=Ready node --all --timeout=180s

      - name: build operator image
        run: docker build -t kube-vnet:e2e .

      - name: load image into kind
        run: kind load docker-image kube-vnet:e2e --name kube-vnet-e2e-kr

      - name: deploy operator
        run: |
          set -euxo pipefail
          sed -i 's|ghcr.io/lhns/kube-vnet:latest|kube-vnet:e2e|' config/manager/manager.yaml
          sed -i 's|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|' config/manager/manager.yaml
          kubectl apply -k config/default
          kubectl wait --for=condition=Available deploy/kube-vnet-controller \
            -n kube-vnet-system --timeout=180s

      - name: run e2e tests
        run: go test -tags e2e ./test/e2e/... -count=1 -v -timeout 15m

      - name: dump diagnostics on failure
        if: failure()
        run: |
          echo "===== nodes ====="
          kubectl describe nodes || true
          echo "===== events ====="
          kubectl get events --sort-by='.lastTimestamp' -A | tail -100 || true
          echo "===== kube-router logs ====="
          kubectl logs -n kube-system ds/kube-router --tail=200 || true
          echo "===== operator logs ====="
          kubectl logs -n kube-vnet-system deploy/kube-vnet-controller --tail=200 || true
          echo "===== virtualnetworks ====="
          kubectl get vnet -A -o yaml || true
          echo "===== networkpolicies ====="
          kubectl get networkpolicy -A -o yaml || true

  e2e-calico:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: create kind cluster (no default CNI)
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kube-vnet-e2e-cal
          config: test/e2e/kind-config.yaml
          wait: 60s

      - name: install Calico
        run: |
          set -euxo pipefail
          kubectl apply --server-side -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/tigera-operator.yaml
          kubectl rollout status -n tigera-operator deploy/tigera-operator --timeout=180s
          kubectl apply -f test/e2e/calico-installation.yaml
          # The Tigera operator creates calico-system + its workloads after the
          # Installation CR is reconciled. Wait until calico-kube-controllers
          # AND csi-node-driver (a DaemonSet) both exist before checking
          # rollouts.
          for i in $(seq 1 60); do
            if kubectl -n calico-system get deployment calico-kube-controllers >/dev/null 2>&1 \
               && kubectl -n calico-system get ds csi-node-driver >/dev/null 2>&1; then
              break
            fi
            echo "waiting for calico-system to materialize ($i)"
            sleep 5
          done
          # Workload-level readiness, not pod-level. `kubectl wait pods --all`
          # races against the operator's rolling pod replacements; rollout
          # status watches the workload's own generation/replica counts and is
          # immune to that race.
          kubectl rollout status -n calico-system deploy/calico-kube-controllers --timeout=300s
          kubectl rollout status -n calico-system deploy/calico-typha            --timeout=300s
          kubectl rollout status -n calico-system ds/calico-node                 --timeout=300s
          kubectl rollout status -n calico-system ds/csi-node-driver             --timeout=300s
          kubectl wait --for=condition=Ready node --all --timeout=180s

      - name: build operator image
        run: docker build -t kube-vnet:e2e .

      - name: load image into kind
        run: kind load docker-image kube-vnet:e2e --name kube-vnet-e2e-cal

      - name: deploy operator
        run: |
          set -euxo pipefail
          sed -i 's|ghcr.io/lhns/kube-vnet:latest|kube-vnet:e2e|' config/manager/manager.yaml
          sed -i 's|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|' config/manager/manager.yaml
          kubectl apply -k config/default
          kubectl wait --for=condition=Available deploy/kube-vnet-controller \
            -n kube-vnet-system --timeout=180s

      - name: run e2e tests
        run: go test -tags e2e ./test/e2e/... -count=1 -v -timeout 15m

      - name: dump diagnostics on failure
        if: failure()
        run: |
          echo "===== events ====="
          kubectl get events --sort-by='.lastTimestamp' -A | tail -100 || true
          echo "===== calico logs ====="
          kubectl logs -n calico-system deploy/calico-kube-controllers --tail=200 || true
          echo "===== operator logs ====="
          kubectl logs -n kube-vnet-system deploy/kube-vnet-controller --tail=200 || true
          echo "===== virtualnetworks ====="
          kubectl get vnet -A -o yaml || true
          echo "===== networkpolicies ====="
          kubectl get networkpolicy -A -o yaml || true

  # e2e-helm uses the same kind+Calico setup as e2e-calico but installs the
  # operator via `helm install` instead of `kubectl apply -k config/default`.
  # Catches drift between the kustomize manifests (which controller-gen
  # owns) and the chart templates (hand-maintained) — exactly the class of
  # bug the recent ClusterRole-RBAC missing-verbs incident exposed.
  e2e-helm:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.3

      - name: create kind cluster (no default CNI)
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kube-vnet-e2e-helm
          config: test/e2e/kind-config.yaml
          wait: 60s

      - name: install Calico
        run: |
          set -euxo pipefail
          kubectl apply --server-side -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/tigera-operator.yaml
          kubectl rollout status -n tigera-operator deploy/tigera-operator --timeout=180s
          kubectl apply -f test/e2e/calico-installation.yaml
          for i in $(seq 1 60); do
            if kubectl -n calico-system get deployment calico-kube-controllers >/dev/null 2>&1 \
               && kubectl -n calico-system get ds csi-node-driver >/dev/null 2>&1; then
              break
            fi
            echo "waiting for calico-system to materialize ($i)"
            sleep 5
          done
          kubectl rollout status -n calico-system deploy/calico-kube-controllers --timeout=300s
          kubectl rollout status -n calico-system deploy/calico-typha            --timeout=300s
          kubectl rollout status -n calico-system ds/calico-node                 --timeout=300s
          kubectl rollout status -n calico-system ds/csi-node-driver             --timeout=300s
          kubectl wait --for=condition=Ready node --all --timeout=180s

      - name: build operator image
        run: docker build -t kube-vnet:e2e .

      - name: load image into kind
        run: kind load docker-image kube-vnet:e2e --name kube-vnet-e2e-helm

      - name: deploy operator (helm)
        run: |
          set -euxo pipefail
          # fullnameOverride pins resource names to kube-vnet-controller so
          # the diagnostic / wait commands below use the same selectors as
          # the kustomize lanes. image.* points at the kind-loaded image.
          helm install kube-vnet charts/kube-vnet \
            --namespace kube-vnet-system --create-namespace \
            --set fullnameOverride=kube-vnet-controller \
            --set operator.clusterBaseline.ingressIsolationLevel=pod \
            --set image.repository=kube-vnet \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --wait --timeout 3m
          kubectl wait --for=condition=Available deploy/kube-vnet-controller \
            -n kube-vnet-system --timeout=180s

      - name: run e2e tests
        run: go test -tags e2e ./test/e2e/... -count=1 -v -timeout 15m

      - name: external-allow accessibility check
        run: |
          set -euxo pipefail

          # ADR 0038: a NodePort Service in a kube-vnet-managed NS must be
          # reachable from outside the cluster via the auto-emitted
          # external-allow NetworkPolicy. Without that policy, the deny-all
          # baseline + per-vnet membership policies block external traffic
          # (namespaceSelector doesn't match node-SNAT'd source IPs).
          #
          # The kind cluster runs nodes as docker containers on a `kind`
          # bridge network. Curling from the GH runner directly to a node's
          # IP at the NodePort is genuinely external from the cluster's
          # perspective — same packet path as a real LB SNAT.

          kubectl create namespace ext-allow-e2e
          kubectl create deploy nginx --image=nginx:alpine -n ext-allow-e2e
          kubectl wait --for=condition=Available deploy/nginx \
            -n ext-allow-e2e --timeout=120s
          kubectl expose deploy nginx -n ext-allow-e2e \
            --type=NodePort --port=80 --target-port=80 --name=nginx
          NODEPORT=$(kubectl get svc nginx -n ext-allow-e2e \
            -o jsonpath='{.spec.ports[0].nodePort}')

          # Wait for the operator to emit the external-allow policy.
          for i in {1..30}; do
            if kubectl get netpol -n ext-allow-e2e \
              -l kube-vnet.system/role=external-allow \
              --no-headers 2>/dev/null | grep -q .; then
              break
            fi
            sleep 2
          done
          kubectl get netpol -n ext-allow-e2e \
            -l kube-vnet.system/role=external-allow \
            --no-headers | grep -q . || {
              echo "FAIL: external-allow policy never appeared"
              kubectl get svc -n ext-allow-e2e -o yaml
              exit 1
            }

          NODE_IP=$(docker inspect kube-vnet-e2e-helm-control-plane \
            -f '{{.NetworkSettings.Networks.kind.IPAddress}}')

          # Wait for kube-proxy to program the NodePort iptables rule.
          # Newly-created Services need a moment before kube-proxy syncs;
          # without this, curl sees "connection refused" immediately and
          # the test fails before NetworkPolicy enforcement even comes
          # into play.
          kubectl wait --for=jsonpath='{.subsets[0].addresses[0].ip}' \
            endpoints/nginx -n ext-allow-e2e --timeout=60s

          # Positive: external curl succeeds. Retry for ~30s with 2s
          # backoff to ride out any residual kube-proxy sync lag.
          http_code=000
          for i in {1..15}; do
            http_code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 \
              "http://$NODE_IP:$NODEPORT/" || echo "000")
            [ "$http_code" = "200" ] && break
            sleep 2
          done
          if [ "$http_code" != "200" ]; then
            echo "FAIL: external HTTP returned $http_code (expected 200)"
            kubectl get netpol -n ext-allow-e2e -o yaml
            kubectl get endpoints -n ext-allow-e2e -o yaml
            kubectl describe svc nginx -n ext-allow-e2e
            exit 1
          fi
          echo "OK (positive): external HTTP 200 with auto-allow."

          # Negative: opt-out at Service level removes the policy.
          kubectl annotate svc nginx -n ext-allow-e2e \
            kube-vnet/external-allow=false
          for i in {1..15}; do
            if ! kubectl get netpol -n ext-allow-e2e \
              -l kube-vnet.system/role=external-allow \
              --no-headers 2>/dev/null | grep -q .; then
              break
            fi
            sleep 2
          done
          # Give the CNI a moment to drop in-flight conntrack entries +
          # apply the new NetworkPolicy verdict to new flows.
          sleep 5
          # Now external traffic is blocked again by the baseline +
          # membership policies. Retry briefly — the failure mode here is
          # "still 200" or hang; one-shot is enough but a couple of attempts
          # smooths over CNI propagation jitter.
          http_code=000
          for i in {1..5}; do
            http_code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 3 \
              "http://$NODE_IP:$NODEPORT/" || echo "000")
            [ "$http_code" != "200" ] && break
            sleep 2
          done
          if [ "$http_code" = "200" ]; then
            echo "FAIL: opt-out didn't take effect — still HTTP 200"
            exit 1
          fi
          echo "OK (negative): opt-out blocks external traffic (saw $http_code)."

      - name: DNS survives kube-system enrollment (ADR 0042)
        run: |
          set -euxo pipefail

          # ADR 0042: enrolling kube-system (removing it from
          # disabledNamespaces) applies the deny-all baseline to CoreDNS,
          # whose :53 ClusterIP is matched by no auto-allow family. The
          # chart's dnsCarveout NetworkPolicy must keep :53 open so cluster
          # DNS survives. On this cluster kube-system holds only CoreDNS +
          # hostNetwork kube-proxy (Calico lives in calico-system), so
          # enrolling it is safe to exercise.
          #
          # Upgrade the release to manage kube-system (empty disabledNamespaces,
          # so only the implicit operator NS stays disabled), then assert the
          # carve-out renders, the baseline applies, and DNS still resolves.
          helm upgrade kube-vnet charts/kube-vnet \
            --namespace kube-vnet-system \
            --set fullnameOverride=kube-vnet-controller \
            --set operator.clusterBaseline.ingressIsolationLevel=pod \
            --set image.repository=kube-vnet \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --set-json 'operator.disabledNamespaces=[]' \
            --wait --timeout 180s

          # The chart-shipped carve-out NP must be present in kube-system.
          kubectl get netpol -n kube-system kube-vnet-coredns-allow

          # The operator now manages kube-system → its deny-all baseline must
          # appear (this is what would black-hole CoreDNS without the carve-out).
          for i in {1..30}; do
            if kubectl get netpol -n kube-system \
              -l kube-vnet.system/role=baseline --no-headers 2>/dev/null | grep -q .; then
              break
            fi
            sleep 2
          done
          kubectl get netpol -n kube-system \
            -l kube-vnet.system/role=baseline --no-headers | grep -q . || {
              echo "FAIL: operator baseline never appeared in kube-system"
              kubectl get netpol -n kube-system -o wide
              exit 1
            }

          # DNS must still resolve from a fresh pod. The probe only does egress
          # (a lookup); the reply rides the established conntrack flow, and
          # CoreDNS accepts the query via the carve-out.
          kubectl run dnsprobe --image=busybox:1.36 --restart=Never -n default \
            --command -- sh -c \
            'for i in $(seq 1 30); do nslookup kubernetes.default.svc.cluster.local && exit 0; sleep 2; done; exit 1'
          if ! kubectl wait --for=jsonpath='{.status.phase}'=Succeeded \
            pod/dnsprobe -n default --timeout=90s; then
            echo "FAIL: cluster DNS did not resolve after enrolling kube-system"
            kubectl logs dnsprobe -n default || true
            kubectl get netpol -n kube-system -o wide
            kubectl describe netpol -n kube-system kube-vnet-coredns-allow || true
            exit 1
          fi
          kubectl delete pod dnsprobe -n default --ignore-not-found
          echo "OK: cluster DNS survives kube-system enrollment (carve-out working)."

      - name: helm uninstall + assert cleanup
        run: |
          set -euxo pipefail

          # Real helm uninstall. The ADR 0036 pre-delete hook should fire,
          # delete every operator-managed NetworkPolicy cluster-wide, then
          # Helm tears down the rest of the release.
          helm uninstall kube-vnet --namespace kube-vnet-system --wait --timeout 3m

          # apiserver finalizer processing can lag a moment after the hook's
          # `kubectl delete --wait=true` returns. 5s is generous.
          sleep 5

          # ASSERT: zero operator-managed NetworkPolicies remain anywhere.
          # If the hook silently no-op'd (wrong selector, RBAC error swallowed,
          # selector mismatch with what the operator actually emitted), this
          # catches it.
          remaining=$(kubectl get networkpolicy -A \
            -l kube-vnet.system/managed-by=kube-vnet \
            --no-headers 2>/dev/null | wc -l)
          if [ "$remaining" -ne 0 ]; then
            echo "FAIL: $remaining operator-managed NetworkPolicies survived helm uninstall."
            kubectl get networkpolicy -A -l kube-vnet.system/managed-by=kube-vnet -o yaml
            exit 1
          fi
          echo "OK: 0 operator-managed NetworkPolicies post-uninstall."

      - name: dump diagnostics on failure
        if: failure()
        run: |
          echo "===== events ====="
          kubectl get events --sort-by='.lastTimestamp' -A | tail -100 || true
          echo "===== calico logs ====="
          kubectl logs -n calico-system deploy/calico-kube-controllers --tail=200 || true
          echo "===== operator logs ====="
          kubectl logs -n kube-vnet-system deploy/kube-vnet-controller --tail=200 || true
          echo "===== helm release ====="
          helm get all kube-vnet -n kube-vnet-system 2>&1 | head -200 || true
          echo "===== virtualnetworks ====="
          kubectl get vnet -A -o yaml || true
          echo "===== networkpolicies ====="
          kubectl get networkpolicy -A -o yaml || true
          echo "===== cleanup hook Job(s) ====="
          kubectl get jobs -A -l app.kubernetes.io/component=cleanup -o yaml 2>&1 || true
          kubectl logs -n kube-vnet-system -l app.kubernetes.io/component=cleanup --tail=200 2>&1 || true

  # e2e-helm-namespace mirrors e2e-helm but installs with
  # ingressIsolationLevel=namespace and runs the namespace-isolation test
  # subset (build tag e2e_namespace). This is the only lane that exercises
  # the namespace-permissive posture end-to-end — the kustomize lanes ship
  # no baseline (effectively pod-strict) and e2e-helm pins =pod for the
  # legacy test assumptions.
  e2e-helm-namespace:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.3

      - name: create kind cluster (no default CNI)
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kube-vnet-e2e-helm-ns
          config: test/e2e/kind-config.yaml
          wait: 60s

      - name: install Calico
        run: |
          set -euxo pipefail
          kubectl apply --server-side -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/tigera-operator.yaml
          kubectl rollout status -n tigera-operator deploy/tigera-operator --timeout=180s
          kubectl apply -f test/e2e/calico-installation.yaml
          for i in $(seq 1 60); do
            if kubectl -n calico-system get deployment calico-kube-controllers >/dev/null 2>&1 \
               && kubectl -n calico-system get ds csi-node-driver >/dev/null 2>&1; then
              break
            fi
            echo "waiting for calico-system to materialize ($i)"
            sleep 5
          done
          kubectl rollout status -n calico-system deploy/calico-kube-controllers --timeout=300s
          kubectl rollout status -n calico-system deploy/calico-typha            --timeout=300s
          kubectl rollout status -n calico-system ds/calico-node                 --timeout=300s
          kubectl rollout status -n calico-system ds/csi-node-driver             --timeout=300s
          kubectl wait --for=condition=Ready node --all --timeout=180s

      - name: build operator image
        run: docker build -t kube-vnet:e2e .

      - name: load image into kind
        run: kind load docker-image kube-vnet:e2e --name kube-vnet-e2e-helm-ns

      - name: deploy operator (helm, ingressIsolationLevel=namespace)
        run: |
          set -euxo pipefail
          helm install kube-vnet charts/kube-vnet \
            --namespace kube-vnet-system --create-namespace \
            --set fullnameOverride=kube-vnet-controller \
            --set operator.clusterBaseline.ingressIsolationLevel=namespace \
            --set image.repository=kube-vnet \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --wait --timeout 3m
          kubectl wait --for=condition=Available deploy/kube-vnet-controller \
            -n kube-vnet-system --timeout=180s

      - name: run e2e namespace-isolation tests
        run: go test -tags e2e_namespace ./test/e2e/... -count=1 -v -timeout 15m

      - name: dump diagnostics on failure
        if: failure()
        run: |
          echo "===== events ====="
          kubectl get events --sort-by='.lastTimestamp' -A | tail -100 || true
          echo "===== calico logs ====="
          kubectl logs -n calico-system deploy/calico-kube-controllers --tail=200 || true
          echo "===== operator logs ====="
          kubectl logs -n kube-vnet-system deploy/kube-vnet-controller --tail=200 || true
          echo "===== helm release ====="
          helm get all kube-vnet -n kube-vnet-system 2>&1 | head -200 || true
          echo "===== cluster baseline ====="
          kubectl get clustervirtualnetworkbaseline default -o yaml || true
          echo "===== virtualnetworks ====="
          kubectl get vnet -A -o yaml || true
          echo "===== networkpolicies ====="
          kubectl get networkpolicy -A -o yaml || true
