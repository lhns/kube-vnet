name: e2e

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Two CNI lanes run in parallel: faster wall-clock feedback per PR
# (~max(kube-router, calico) instead of the sum). We accept the extra CI
# minutes when one lane fails because the time saved on the common case
# (both pass) is the larger win.

jobs:
  e2e-kube-router:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: create kind cluster (no default CNI)
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kube-vnet-e2e-kr
          config: test/e2e/kind-config.yaml
          wait: 60s

      - name: install kube-router
        run: |
          set -euxo pipefail
          kubectl apply -f https://raw.githubusercontent.com/cloudnativelabs/kube-router/master/daemonset/kubeadm-kuberouter.yaml
          kubectl rollout status -n kube-system ds/kube-router --timeout=180s
          kubectl wait --for=condition=Ready node --all --timeout=180s

      - name: build operator image
        run: docker build -t kube-vnet:e2e .

      - name: load image into kind
        run: kind load docker-image kube-vnet:e2e --name kube-vnet-e2e-kr

      - name: deploy operator
        run: |
          set -euxo pipefail
          sed -i 's|ghcr.io/lhns/kube-vnet:latest|kube-vnet:e2e|' config/manager/manager.yaml
          sed -i 's|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|' config/manager/manager.yaml
          kubectl apply -k config/default
          kubectl wait --for=condition=Available deploy/kube-vnet-controller \
            -n kube-vnet-system --timeout=180s

      - name: run e2e tests
        run: go test -tags e2e ./test/e2e/... -count=1 -v -timeout 15m

      - name: dump diagnostics on failure
        if: failure()
        run: |
          echo "===== nodes ====="
          kubectl describe nodes || true
          echo "===== events ====="
          kubectl get events --sort-by='.lastTimestamp' -A | tail -100 || true
          echo "===== kube-router logs ====="
          kubectl logs -n kube-system ds/kube-router --tail=200 || true
          echo "===== operator logs ====="
          kubectl logs -n kube-vnet-system deploy/kube-vnet-controller --tail=200 || true
          echo "===== virtualnetworks ====="
          kubectl get vnet -A -o yaml || true
          echo "===== networkpolicies ====="
          kubectl get networkpolicy -A -o yaml || true

  e2e-calico:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: create kind cluster (no default CNI)
        uses: helm/kind-action@v1.14.0
        with:
          cluster_name: kube-vnet-e2e-cal
          config: test/e2e/kind-config.yaml
          wait: 60s

      - name: install Calico
        run: |
          set -euxo pipefail
          kubectl apply --server-side -f https://raw.githubusercontent.com/projectcalico/calico/v3.28.0/manifests/tigera-operator.yaml
          kubectl rollout status -n tigera-operator deploy/tigera-operator --timeout=180s
          kubectl apply -f test/e2e/calico-installation.yaml
          # The Tigera operator creates calico-system + its workloads after the
          # Installation CR is reconciled. Wait until calico-kube-controllers
          # AND csi-node-driver (a DaemonSet) both exist before checking
          # rollouts.
          for i in $(seq 1 60); do
            if kubectl -n calico-system get deployment calico-kube-controllers >/dev/null 2>&1 \
               && kubectl -n calico-system get ds csi-node-driver >/dev/null 2>&1; then
              break
            fi
            echo "waiting for calico-system to materialize ($i)"
            sleep 5
          done
          # Workload-level readiness, not pod-level. `kubectl wait pods --all`
          # races against the operator's rolling pod replacements; rollout
          # status watches the workload's own generation/replica counts and is
          # immune to that race.
          kubectl rollout status -n calico-system deploy/calico-kube-controllers --timeout=300s
          kubectl rollout status -n calico-system deploy/calico-typha            --timeout=300s
          kubectl rollout status -n calico-system ds/calico-node                 --timeout=300s
          kubectl rollout status -n calico-system ds/csi-node-driver             --timeout=300s
          kubectl wait --for=condition=Ready node --all --timeout=180s

      - name: build operator image
        run: docker build -t kube-vnet:e2e .

      - name: load image into kind
        run: kind load docker-image kube-vnet:e2e --name kube-vnet-e2e-cal

      - name: deploy operator
        run: |
          set -euxo pipefail
          sed -i 's|ghcr.io/lhns/kube-vnet:latest|kube-vnet:e2e|' config/manager/manager.yaml
          sed -i 's|imagePullPolicy: IfNotPresent|imagePullPolicy: Never|' config/manager/manager.yaml
          kubectl apply -k config/default
          kubectl wait --for=condition=Available deploy/kube-vnet-controller \
            -n kube-vnet-system --timeout=180s

      - name: run e2e tests
        run: go test -tags e2e ./test/e2e/... -count=1 -v -timeout 15m

      - name: dump diagnostics on failure
        if: failure()
        run: |
          echo "===== events ====="
          kubectl get events --sort-by='.lastTimestamp' -A | tail -100 || true
          echo "===== calico logs ====="
          kubectl logs -n calico-system deploy/calico-kube-controllers --tail=200 || true
          echo "===== operator logs ====="
          kubectl logs -n kube-vnet-system deploy/kube-vnet-controller --tail=200 || true
          echo "===== virtualnetworks ====="
          kubectl get vnet -A -o yaml || true
          echo "===== networkpolicies ====="
          kubectl get networkpolicy -A -o yaml || true
